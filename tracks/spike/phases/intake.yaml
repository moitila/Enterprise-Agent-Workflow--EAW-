config_version: 1

phase:
  id: intake
  name: Spike Intake
  description: >
    Reads raw materials from ingest/ and structures the spike investigation question.
    Defines scope, success criteria and initial risks. Does NOT formulate hypotheses
    and does NOT investigate target repositories.

  prompt:
    active: 1
    path: templates/prompts/spike/intake/prompt_v<active>.md

  outputs:
    create_directories:
      - ingest
      - investigations
    create_artifacts:
      - investigations/00_spike_intake.md
      - investigations/_intake_provenance.md

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/00_spike_intake.md
      - investigations/_intake_provenance.md
