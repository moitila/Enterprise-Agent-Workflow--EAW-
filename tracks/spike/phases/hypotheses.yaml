config_version: 1

phase:
  id: hypotheses
  name: Spike Hypotheses
  description: >
    Generates 3 to 7 testable hypotheses from the spike intake. Each hypothesis
    declares how it can be validated or discarded. Does NOT investigate code and
    does NOT propose solutions.

  skills:
    - eaw_spike_operator

  prompt:
    active: 1
    path: templates/prompts/spike/hypotheses/prompt_v<active>.md

  outputs:
    create_directories: []
    create_artifacts:
      - investigations/10_hypotheses.md

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - path: investigations/10_hypotheses.md
        min_bytes: 500
        validation_mode: blocking
