config_version: 1

track:
  id: spike
  name: Spike Investigation Track
  description: >
    Controlled technical investigation track. A spike answers a specific question
    before committing to implementation. It produces a recommendation, evidence
    and a backlog — never code changes in target repositories.
  initial_phase: intake
  final_phase: backlog_handoff

  initial_outputs:
    create_directories:
      - ingest
      - investigations
    create_artifacts: []

  phases:
    - intake
    - hypotheses
    - findings
    - technical_decision
    - backlog_handoff

  transitions:
    intake:
      next: hypotheses
    hypotheses:
      next: findings
    findings:
      next: technical_decision
    technical_decision:
      next: backlog_handoff

  rules:
    one_prompt_per_phase: true
    generated_artifacts_of_each_phase_must_be_non_empty: true
    allow_manual_phase_skip: false
