config_version: 1

phase:
  id: configure_env
  name: Configure Environment
  description: >
    Set EAW_WORKDIR in the active shell and persist to shell config file.
    Gate: echo $EAW_WORKDIR must return the configured path (prompt instruction, H2).

  skills:
    - bootstrap_operator

  prompt:
    active: 1
    path: templates/prompts/bootstrap/configure_env/prompt_v1.md

  outputs:
    create_artifacts:
      - bootstrap/configure_env_report.md
    prompts:
      - configure_env

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - bootstrap/configure_env_report.md
