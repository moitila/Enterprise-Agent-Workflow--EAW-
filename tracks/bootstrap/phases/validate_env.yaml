config_version: 1

phase:
  id: validate_env
  name: Validate Environment
  description: Run eaw validate and eaw doctor to confirm full environment health.

  skills:
    - bootstrap_operator

  prompt:
    active: 1
    path: templates/prompts/bootstrap/validate_env/prompt_v1.md

  outputs:
    create_artifacts:
      - bootstrap/validate_env_report.md
    prompts:
      - validate_env

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - bootstrap/validate_env_report.md
