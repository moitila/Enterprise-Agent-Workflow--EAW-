config_version: 1

phase:
  id: planning
  name: Planning
  description: Define implementation steps.

  prompt:
    active: 3
    path: templates/prompts/feature/planning/prompt_v<active>.md

  context:
    dynamic_context_template: deterministic_baseline_v1

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/40_next_steps.md
    prompts:
      - planning

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/40_next_steps.md
