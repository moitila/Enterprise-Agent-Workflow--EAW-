config_version: 1

phase:
  id: findings
  name: Findings
  description: Analyze the intake information and identify key findings.

  prompt:
    active: 2
    path: templates/prompts/feature/findings/prompt_v<active>.md

  tooling_hints:
    - Ler somente `<CARD_DIR>` e TARGET_REPOS em modo read-only.
    - Quando `WORKDIR` estiver definido como `<WORKDIR>`, tratar `<OUTDIR>` como a saida base isolada do runtime.
    - Registrar no findings a saida relevante de `doctor` e `validate`, usando `<TARGET_REPO>` apenas como referencia do repositorio alvo listado no ambiente.

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/20_findings.md
    prompts:
      - findings

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/20_findings.md
