config_version: 1

phase:
  id: findings
  name: Findings
  description: Analyze the intake information and identify key findings.

  prompt:
    active: 1
    path: templates/prompts/default/findings/prompt_v<active>.md

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/20_findings.md
    prompts:
      - findings

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/20_findings.md
