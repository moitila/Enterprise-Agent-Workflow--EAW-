config_version: 1

phase:
  id: implementation_planning
  name: Implementation Planning
  description: Plan the implementation tasks.

  prompt:
    active: 7
    path: templates/prompts/feature/implementation_planning/prompt_v<active>.md

  outputs:
    create_directories:
      - prompts
      - implementation
    create_artifacts:
      - implementation/00_scope.lock.md
      - implementation/10_change_plan.md
    prompts:
      - implementation_planning

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - path: implementation/00_scope.lock.md
        min_bytes: 500
        validation_mode: blocking
      - path: implementation/10_change_plan.md
        min_bytes: 500
        validation_mode: blocking
