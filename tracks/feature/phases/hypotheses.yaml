config_version: 1

phase:
  id: hypotheses
  name: Hypotheses
  description: Generate possible causes or solution directions.

  prompt:
    active: 3
    path: templates/prompts/feature/hypotheses/prompt_v<active>.md

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/30_hypotheses.md
    prompts:
      - hypotheses

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/30_hypotheses.md
