config_version: 1

phase:
  id: intake
  name: Intake
  description: Build the structured intake artifact from ingest evidence and compatibility fallback inputs.

  prompt:
    active: 2
    path: templates/prompts/feature/intake/prompt_v<active>.md

  outputs:
    create_directories:
      - investigations
      - context
    create_artifacts:
      - investigations/00_intake.md
      - investigations/_intake_provenance.md

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/00_intake.md
      - investigations/_intake_provenance.md
