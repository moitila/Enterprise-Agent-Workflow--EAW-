config_version: 1

phase:
  id: implementation_executor
  name: Implementation Executor
  description: Execute the planned implementation tasks.

  prompt:
    active: 1
    path: templates/prompts/default/implementation_executor/prompt_v<active>.md

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - implementation/20_patch_notes.md
    prompts:
      - implementation_executor

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - implementation/20_patch_notes.md
