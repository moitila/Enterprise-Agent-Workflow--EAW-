config_version: 1

track:
  id: ARCH_REFACTOR_ONBOARD
  name: Architecture Refactor Track with Onboard
  description: >
    Canonical EAW track for deterministic architectural refactor analysis,
    alignment, scoped implementation planning and controlled execution, with onboard.
  initial_phase: ingest
  final_phase: implementation_executor

  initial_outputs:
    create_directories:
      - ingest
      - investigations
      - context
      - implementation
    create_artifacts: []

  phases:
    - ingest
    - intake
    - findings
    - hypotheses
    - planning
    - implementation_planning
    - implementation_executor

  transitions:
    ingest:
      next: intake
    intake:
      next: findings
      skip_when:
        - SIMPLE_ALIGNMENT
      contract:
        emit_phase_output: true
        emit_handoff: true
    findings:
      next: hypotheses
      skip_when:
        - NO_CODE_DEVIATION
        - INFORMATIONAL_ONLY
        - ADHERENCE_CONFIRMED
      contract:
        emit_phase_output: true
        emit_handoff: true
        consume_previous: true
    hypotheses:
      next: planning
      contract:
        emit_phase_output: true
        emit_handoff: true
        consume_previous: true
    planning:
      next: implementation_planning
      skip_when:
        - TRIVIAL_SCOPE
      contract:
        emit_phase_output: true
        emit_handoff: true
        consume_previous: true
    implementation_planning:
      next: implementation_executor

  rules:
    one_prompt_per_phase: true
    generated_artifacts_of_each_phase_must_be_non_empty: true
    allow_phase_skip: false
    allow_manual_phase_skip: false
