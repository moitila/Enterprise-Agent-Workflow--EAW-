config_version: 1

phase:
  id: findings
  name: Findings
  description: Validate the current behavior and architectural adherence with evidence.

  prompt:
    active: 3
    path: templates/prompts/ARCH_REFACTOR_ONBOARD/findings/prompt_v<active>.md

  context:
    onboarding_template: architecture_first

  tooling_hints:
    - Ler somente `<CARD_DIR>` e TARGET_REPOS em modo read-only.
    - Registrar a saida relevante de `doctor` e `validate`.
    - Quando `phase.context.onboarding_template` estiver declarado, consumir onboarding a partir de `{{EAW_WORKDIR}}/context_sources/onboarding/<resolved_repo_key>/` apos resolver exatamente um `resolved_repo_key`.

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/20_findings.md
    prompts:
      - findings

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/20_findings.md
