config_version: 1

phase:
  id: intake
  name: Intake
  description: Define the problem, human traceability, and runtime handoff from normalized ingest evidence.

  prompt:
    active: 3
    path: templates/prompts/ARCH_REFACTOR_ONBOARD/intake/prompt_v<active>.md

  context:
    onboarding_template: architecture_first

  tooling_hints:
    - Quando `phase.context.onboarding_template` estiver declarado, consumir onboarding a partir de `{{EAW_WORKDIR}}/context_sources/onboarding/<resolved_repo_key>/` apos resolver exatamente um `resolved_repo_key`.

  outputs:
    create_directories:
      - investigations
      - context
    create_artifacts:
      - investigations/00_intake.md
      - investigations/_intake_provenance.md
      - investigations/20_handoff.json

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/00_intake.md
      - investigations/_intake_provenance.md
      - investigations/20_handoff.json
