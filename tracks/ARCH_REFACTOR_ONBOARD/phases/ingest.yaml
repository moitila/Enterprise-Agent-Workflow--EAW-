config_version: 1

phase:
  id: ingest
  name: Ingest
  description: Collect and normalize raw review evidence before intake.

  prompt:
    active: 2
    path: templates/prompts/ARCH_REFACTOR_ONBOARD/ingest/prompt_v<active>.md

  context:
    onboarding_template: architecture_first

  tooling_hints:
    - Tratar `out/<CARD>/ingest/` como a origem primaria dos insumos brutos.
    - Nao acessar TARGET_REPOS durante a fase de ingest.

  outputs:
    create_directories:
      - ingest
    create_artifacts:
      - ingest/sources.md
      - ingest/review_evidence.raw.md
      - ingest/review_evidence.normalized.md

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - ingest/sources.md
      - ingest/review_evidence.raw.md
      - ingest/review_evidence.normalized.md
