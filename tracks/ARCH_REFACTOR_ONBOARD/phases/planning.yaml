config_version: 1

phase:
  id: planning
  name: Planning
  description: Produce the architectural alignment plan without implementation leakage.

  prompt:
    active: 3
    path: templates/prompts/ARCH_REFACTOR_ONBOARD/planning/prompt_v<active>.md

  context:
    onboarding_template: architecture_first

  tooling_hints:
    - Quando `phase.context.onboarding_template` estiver declarado, consumir onboarding a partir de `{{EAW_WORKDIR}}/context_sources/onboarding/<resolved_repo_key>/` apos resolver exatamente um `resolved_repo_key`.

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/40_next_steps.md
    prompts:
      - planning

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/40_next_steps.md
