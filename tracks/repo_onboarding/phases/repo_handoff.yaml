config_version: 1

phase:
  id: repo_handoff
  name: Repository Handoff
  description: Consolidate onboarding artifacts into a reusable handoff for future tracks and cards.

  prompt:
    active: 1
    path: templates/prompts/repo_onboarding/repo_handoff/prompt_v<active>.md

  tooling_hints:
    - Consolidar a partir dos artefatos do card e da fonte estavel publicada no workspace.
    - Nao materializar onboarding em `out/<CARD>/context/onboarding/` nesta track.

  outputs:
    create_directories:
      - context
      - prompts
    create_artifacts:
      - context/onboarding_handoff.md
    prompts:
      - repo_handoff

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - context/onboarding_handoff.md
