config_version: 1

phase:
  id: repo_analysis
  name: Repository Analysis
  description: Analyze the selected repository and produce a reusable operational profile.

  prompt:
    active: 1
    path: templates/prompts/repo_onboarding/repo_analysis/prompt_v<active>.md

  tooling_hints:
    - Ler o repositorio alvo somente em modo read-only.
    - Priorizar arquivos de orientacao como README, docs, manifests, configs de build e scripts de automacao.

  outputs:
    create_directories:
      - context
      - investigations
      - prompts
    create_artifacts:
      - context/repository_profile.md
      - context/repository_commands.md
      - context/onboarding_source_manifest.md
      - investigations/20_repo_analysis.md
    prompts:
      - repo_analysis

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - context/repository_profile.md
      - context/repository_commands.md
      - context/onboarding_source_manifest.md
      - investigations/20_repo_analysis.md
