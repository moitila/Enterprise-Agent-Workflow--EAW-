config_version: 1

phase:
  id: hypotheses
  name: Hypotheses
  description: Generate possible causes or solution directions.

  prompt:
    active: 3
    path: templates/prompts/bug_ONBOARD/hypotheses/prompt_v<active>.md

  context:
    onboarding_template: debug_first

  tooling_hints:
    - Quando `phase.context.onboarding_template` estiver declarado, consumir onboarding a partir de `{{EAW_WORKDIR}}/context_sources/onboarding/<resolved_repo_key>/` apos resolver exatamente um `resolved_repo_key`.
    - Priorizar arquivos de debug playbook e padroes de logging do onboarding.

  outputs:
    create_directories: []
    create_artifacts:
      - investigations/30_hypotheses.md

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/30_hypotheses.md
