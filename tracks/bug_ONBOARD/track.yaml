config_version: 1

track:
  id: bug_ONBOARD
  name: Bug Track With Onboarding
  description: >
    Canonical EAW track installed in the repository as the official
    workflow source for bug cards.
  initial_phase: intake
  final_phase: implementation_executor

  initial_outputs:
    create_directories:
      - investigations
      - intake
      - context
    create_artifacts: []

  phases:
    - intake
    - findings
    - hypotheses
    - planning
    - implementation_planning
    - implementation_executor

  transitions:
    intake:
      next: findings
      contract:
        emit_phase_output: false
        emit_handoff: false
    findings:
      next: hypotheses
      skip_when:
        - ROOT_CAUSE_CONFIRMED
      contract:
        emit_phase_output: true
        emit_handoff: true
    hypotheses:
      next: planning
      contract:
        emit_phase_output: true
        emit_handoff: true
        consume_previous: true
    planning:
      next: implementation_planning
    implementation_planning:
      next: implementation_executor

  rules:
    one_prompt_per_phase: true
    generated_artifacts_of_each_phase_must_be_non_empty: true
    allow_phase_skip: false
    allow_manual_phase_skip: false
