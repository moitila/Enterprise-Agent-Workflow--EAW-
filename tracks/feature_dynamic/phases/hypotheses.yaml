config_version: 1

phase:
  id: hypotheses
  name: Hypotheses
  description: Generate possible causes or solution directions.

  prompt:
    active: 4
    path: templates/prompts/feature_dynamic/hypotheses/prompt_v<active>.md

  context:
    onboarding_template: repo_discovery

  tooling_hints:
    - Quando `phase.context.onboarding_template` estiver declarado, consumir onboarding a partir de `{{EAW_WORKDIR}}/context_sources/onboarding/<resolved_repo_key>/` apos resolver exatamente um `resolved_repo_key`.
    - Nao materializar `investigations/40_next_steps.md` nesta fase nem antecipar scaffold de `planning`.
    - Limitar a escrita governada desta fase a `investigations/30_hypotheses.md`.

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/10_phase_output.json
      - investigations/20_handoff.json
      - investigations/30_hypotheses.md
    prompts:
      - hypotheses

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/10_phase_output.json
      - investigations/20_handoff.json
      - investigations/30_hypotheses.md
