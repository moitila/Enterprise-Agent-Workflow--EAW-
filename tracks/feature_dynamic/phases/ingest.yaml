config_version: 1

phase:
  id: ingest
  name: Ingest
  description: Collect and normalize raw card inputs before the explicit intake phase materializes structured context.

  prompt:
    active: 2
    path: templates/prompts/feature_dynamic/ingest/prompt_v<active>.md

  tooling_hints:
    - Tratar `out/<CARD>/ingest/` como a origem primaria de insumos brutos quando existir.
    - Nao materializar `context/dynamic/` nesta fase; essa responsabilidade pertence a `intake`.

  outputs:
    create_directories:
      - ingest
      - investigations
      - context
    create_artifacts:
      - investigations/00_intake.md
      - investigations/_intake_provenance.md

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/00_intake.md
      - investigations/_intake_provenance.md
