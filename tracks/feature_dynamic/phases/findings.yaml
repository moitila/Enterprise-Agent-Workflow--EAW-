config_version: 1

phase:
  id: findings
  name: Findings
  description: Analyze the intake information and identify key findings using the canonical prompt contract for this phase.

  prompt:
    # Canonical prompt surface currently resolves to templates/prompts/feature_dynamic/findings/prompt_v5.md.
    active: 5
    path: templates/prompts/feature_dynamic/findings/prompt_v<active>.md

  context:
    dynamic_context_template: deterministic_baseline_v1
    onboarding_template: repo_discovery

  tooling_hints:
    - Quando `phase.context.onboarding_template` estiver declarado, consumir onboarding a partir de `{{EAW_WORKDIR}}/context_sources/onboarding/<resolved_repo_key>/` apos resolver exatamente um `resolved_repo_key`.
    - Ler somente `<CARD_DIR>` e TARGET_REPOS em modo read-only.
    - Quando `WORKDIR` estiver definido como `<WORKDIR>`, tratar `<OUTDIR>` como a saida base isolada do runtime.
    - Nao executar doctor ou validate nesta fase.
    - A consistencia de execucao e garantida pelo eaw next como regra de orquestracao; a fase continua vinculada ao contrato visivel do prompt ativo, usando `<TARGET_REPO>` apenas como referencia do repositorio alvo listado no ambiente.

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/20_findings.md
      - investigations/20_handoff.json
    prompts:
      - findings

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - investigations/20_findings.md
