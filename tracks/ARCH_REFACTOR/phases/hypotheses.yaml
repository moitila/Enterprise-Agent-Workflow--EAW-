config_version: 1

phase:
  id: hypotheses
  name: Hypotheses
  description: Explain only residual uncertainty that remains after findings.

  prompt:
    active: 1
    path: templates/prompts/ARCH_REFACTOR/hypotheses/prompt_v<active>.md

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - investigations/30_hypotheses.md
      - investigations/20_handoff.json
    prompts:
      - hypotheses

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - path: investigations/30_hypotheses.md
        min_bytes: 500
        validation_mode: blocking
      - path: investigations/20_handoff.json
        min_bytes: 500
        validation_mode: blocking
