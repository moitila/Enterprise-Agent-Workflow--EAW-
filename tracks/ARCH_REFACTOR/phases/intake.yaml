config_version: 1

phase:
  id: intake
  name: Intake
  description: Define the problem and pipeline signals from normalized ingest evidence.

  prompt:
    active: 1
    path: templates/prompts/ARCH_REFACTOR/intake/prompt_v<active>.md

  outputs:
    create_directories:
      - investigations
      - context
    create_artifacts:
      - investigations/00_intake.md
      - investigations/_intake_provenance.md

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - path: investigations/00_intake.md
        min_bytes: 500
        validation_mode: blocking
      - path: investigations/_intake_provenance.md
        min_bytes: 500
        validation_mode: blocking
