config_version: 1

phase:
  id: implementation_planning
  name: Implementation Planning
  description: Freeze executable scope and generate the sovereign write allowlist.

  prompt:
    active: 1
    path: templates/prompts/ARCH_REFACTOR/implementation_planning/prompt_v<active>.md

  outputs:
    create_directories:
      - prompts
      - implementation
    create_artifacts:
      - implementation/00_scope.lock.md
      - implementation/10_change_plan.md
    prompts:
      - implementation_planning

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - implementation/00_scope.lock.md
      - implementation/10_change_plan.md
