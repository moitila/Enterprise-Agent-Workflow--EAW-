config_version: 1

phase:
  id: implementation_executor
  name: Implementation Executor
  description: Execute the planned implementation tasks.

  prompt:
    active: 1
    path: templates/prompts/patch/implementation_executor/prompt_v<active>.md

  outputs:
    create_directories:
      - prompts
    create_artifacts:
      - pilot_report.md
    prompts:
      - implementation_executor

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - path: pilot_report.md
        min_bytes: 500
        validation_mode: blocking
