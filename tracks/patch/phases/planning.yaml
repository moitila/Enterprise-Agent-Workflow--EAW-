config_version: 1

phase:
  id: planning
  name: Planning
  description: Produzir scope lock e change plan a partir dos insumos coletados na fase ingest.

  prompt:
    active: 1
    path: templates/prompts/patch/planning/prompt_v<active>.md

  outputs:
    create_directories:
      - prompts
      - implementation
    create_artifacts:
      - implementation/00_scope.lock.md
      - implementation/10_change_plan.md
    prompts:
      - planning

  completion:
    strategy: required_artifacts_exist
    required_artifacts:
      - path: implementation/00_scope.lock.md
        min_bytes: 500
        validation_mode: blocking
        required_sections:
          - "## Base Obrigatoria"
          - "## Hipotese(s) Base"
          - "## Contexto"
          - "## In Scope"
          - "## Out of Scope"
          - "## Allowlist de Escrita"
          - "## Regra de Escrita"
      - path: implementation/10_change_plan.md
        min_bytes: 500
        validation_mode: blocking
        required_sections:
          - "## Objetivo de Execucao"
          - "## Hipotese(s) Selecionada(s)"
          - "## Assuncoes Explicitas"
          - "## Steps"
          - "## Validacao Tecnica Obrigatoria"
          - "## Rollback"
